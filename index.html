	const locations = {
		"default":    "lat=49.20020&lng=9.17364&zoom=9.67&pitch=0&bearing=0&data-category=1",
		"Strategie1": "lat=49.21308&lng=9.19175&zoom=11.88&data-category=1",
		"Strategie2": "lat=49.22112&lng=9.18037&zoom=12.27&data-category=2",
		"Strategie3": "lat=49.21393&lng=9.28937&zoom=11.78&data-category=3",
		"Strategie4": "lat=49.12004&lng=9.16236&zoom=12.78&data-category=4",
		"Strategie5": "lat=49.19340&lng=9.20595&zoom=12.40&data-category=5",
		"Strategie6": "lat=49.19348&lng=9.20179&zoom=12.40&data-category=6",
		"Strategie7": "lat=49.09376&lng=9.27137&zoom=13.51&data-category=7",
		"Strategie8": "lat=49.09376&lng=9.27137&zoom=13.51&data-category=8",
		"Strategie9": "lat=49.15718&lng=9.26783&zoom=12.44&data-category=9",
		"Strategie10": "lat=49.15718&lng=9.26783&zoom=12.44&data-category=10",
		"Strategie11": "lat=49.16067&lng=9.27484&zoom=13.66&data-category=11",
		"Strategie12": "lat=49.16282&lng=9.27428&zoom=13.85&data-category=12",
		"Strategie13": "lat=49.16096&lng=9.26660&zoom=12.26&data-category=13",
		"Strategie14": "lat=49.17540&lng=9.16602&zoom=12.66&data-category=14",
		"Strategie15": "lat=49.17732&lng=9.23586&zoom=13.15&data-category=15",
		"Strategie16": "lat=49.17732&lng=9.23586&zoom=13.15&data-category=16"
	};

	// Start with default
	const baseParams = new URLSearchParams(locations.default);

	// Overwrite with Strategie if specified
	const urlParams = new URLSearchParams(window.location.search);
	const locKey = urlParams.get('location');
	if (locKey && locations[locKey]) {
		const stratParams = new URLSearchParams(locations[locKey]);
		for (const [key, value] of stratParams) {
			baseParams.set(key, value);
		}
	}

	// Overwrite with any explicit URL parameters
	for (const [key, value] of urlParams) {
		if (key !== 'location') {
			const num = parseFloat(value);
			// Only overwrite if it's a valid number
			if (!isNaN(num)) {
			baseParams.set(key, value);
			}
		}
	}

	// Parse final parameters
	const lat      = parseFloat(baseParams.get('lat'));
	const lng      = parseFloat(baseParams.get('lng'));
	const zoom     = parseFloat(baseParams.get('zoom'));
	const pitch    = parseFloat(baseParams.get('pitch'));
	const bearing  = parseFloat(baseParams.get('bearing'));
	const category =  parseInt(baseParams.get('data-category'));

	// Initialize map
	const map = new maplibregl.Map({
	container: 'map',
	style: 'basemap-de-style-a06ceb84.json',
	center: [lng, lat],
	zoom: zoom,
	bearing: bearing,
	pitch: pitch,
	maxZoom: 18,
	canvasContextAttributes: { preserveDrawingBuffer: true }
	});
	map.addControl(new maplibregl.NavigationControl({visualizePitch: true}), 'bottom-left');

	
	const data_bottlenecks = await (await fetch('data/geojson/problemstellen.geojson')).json();
	let data_measures = await (await fetch('data/geojson/massnahmen.geojson')).json();
	const data_streets = await (await fetch('data/geojson/strategic-networks/iv/BLK.geojson')).json();
	window.data_alternative_routes = await (await fetch('data/geojson/alternativrouten.geojson')).json();

	const img_route = 'data/images/'

	window.cursorOnMarker = false;

	document.getElementById('button-fit').addEventListener('click', () => {
		// map.fitBounds(bbox, { duration: 1000, pitch: 0, padding: 64, });
		map.fitBounds([
			[8.82088, 49.37708],
			[9.52641, 49.02268]
        ], { duration: 1000, padding: 32 , pitch: 0});
	});

    map.on('load', async () => {
		prepareUI();
		// loadMeasures(); // Adds Measures markers to the map. Adds Category groups to the sidebar. Adds clicking functionality to the markers. Adds eventListeners to the markers. Adds Sidebar entries to the sidebar measures tab. Only has to be called once.
		provideStyleImage(map);
		addStrategicNetworkPT(map);
		addStrategicNetworkBike(map);
		addStudyArea(map); // Adds Untersuchungsgebiet layer
		addStrategicNetworkStreets(map);
		addAccidents(map);
		addMobilityStations(map);
		// addNoise(map);
		addMunicipalities(map); // Adds Communities layer
		addCounties(); // Adds Counties Layer
		addTraffic(); // Adds realtime traffic layer to map.
		addAlternativeRoutes(map, data_alternative_routes);
		addBottlenecks(map, data_bottlenecks, img_route); // Adds bottlenecks layer to the map.
		addMeasures(map, data_measures, img_route); // Adds measures layer to the map.
		addStrategies(map, data_bottlenecks, data_measures, window.data_alternative_routes); // Adds strategies to the sidebar. Doesn't touch the map
		handleMapClicks();
		handleHovering();
		handlePointer();

		// click the visibility checkbox of the element of class category-group and data-category equal to the category URL parameter, if it exists.
		if (!category || isNaN(category) || category < 1) {
			console.log("No valid category specified in URL parameters.");
			category = 1;
		}
		if (category) {
			console.log("Trying to set category " + category + " to visible based on URL parameter.");
			const selector = `.category-group[data-category="strategy-${category}"] #visibility-checkbox`;
			const checkbox = document.querySelector(selector);
			if (checkbox) {
				checkbox.click();
			}
		}

		console.log("load called");

		let bounds = map.getBounds();
		console.log('Map bounds (current view):', bounds);
		
	});

	map.on('style.load', async () => {
		
		addTraffic();

		//await addOtherLayers();

		addStrategicNetworkPT(map);
		addStrategicNetworkBike(map);
		addStrategicNetworkStreets(map);
		addStudyArea(map);
		addAccidents(map);
		// addNoise(map);
		addMunicipalities(map);
		addCounties();
		addAlternativeRoutes(map, data_alternative_routes);
		addBottlenecks(map, data_bottlenecks, img_route);
		console.log("style.load called");

	});

	map.on('moveend', () => {
		const center = map.getCenter();
		const zoom = map.getZoom();
		const params = new URLSearchParams({
			lat: center.lat.toFixed(5),
			lng: center.lng.toFixed(5),
			zoom: map.getZoom().toFixed(2),
			// bearing: map.getBearing().toFixed(1),
			// pitch: map.getPitch().toFixed(1)
		});
		history.replaceState({}, '', `${location.pathname}?${params}`);
	});

	async function addCounties()
	{
		map.addSource('landkreise', {
            type: 'geojson',
            // Use a URL for the value for the `data` property.
            data: 'data/geojson/landkreise.geojson',
			generateId: true // This ensures that all features have unique IDs
        });

		map.addLayer({
            'id': 'landkreise-fill',
            'type': 'fill',
            'source': 'landkreise',
            'layout': {
				'visibility': 'none',
			},
            'paint': {
                'fill-color': '#0000AA',
                'fill-opacity': [
                    'case',
                    ['boolean', ['feature-state', 'hover'], false],
                    0.1,
                    0.0
                ]
            }
        });

        map.addLayer({
            'id': 'landkreise-line',
            'type': 'line',
            'source': 'landkreise',
			'layout': {
				'visibility': 'none',
			},
            'paint': {
                'line-color': '#0000AA',
                'line-width': 1.25,
				'line-dasharray': [3,3]
            }
        });

		console.log("added landkreise...")
	}

	async function addTraffic(){
		console.log("Adding layer traffic")

		map.addSource('traffic-flow-source', {
            type: 'vector',
            tiles: [
            atob('aHR0cHM6Ly90cmFmZmljLnZlY3Rvci5oZXJlYXBpLmNvbS92Mi90cmFmZmljdGlsZXMvZmxvdy9tYy97en0ve3h9L3t5fS9vbXY/YXBpS2V5PU9OTkEwVlVwVXhBYXhfS1BtREhUNF9pWVFlbUtnaXRMX01lV1Y2eHBBVkE=') ,
            ],
        });

		console.log($("#traffic").prop("checked"));

		let visibility = "none";

			visibility = "visible"

            {

                    "#FF0000"

                  "line-width": 3,
				  "line-offset" : 2,

					"visibility": visibility,
				}
            }
        );
	}


	

	function prepareUI(){
		console.log("preparing UI");
		$(".tab").click(openTab); // adds the Tab clicking functionality
		$("#bottlenecks").toggle(); // hides the bottlenecks div in the sidebar.
		// $("#strategies").toggle(); // hides the strategies div in the sidebar.
		$("#measures").toggle(); // hides the measures div in the sidebar.

		$("#tab-bottlenecks > #visibility-checkbox").on('change',  (event) => { 
			// If bottlenecks was checked, ensure strategies is unchecked and trigger the strategies change handler
			let groups = $('#bottlenecks .category-group');
			console.log(groups);
			if($(event.target).prop('checked'))
			{
				if ($("#tab-strategies > #visibility-checkbox").prop('checked')){
					$("#tab-strategies > #visibility-checkbox").prop('checked', false);
					$("#tab-strategies > #visibility-checkbox").trigger('change');
				}
				// if there is no bottleneck category group checked, set the checkboxes of all bottlenecks category groups to true and trigger the change behaviour only of the last one
				let anyChecked = false;
				groups.each(function() {
					if ($(this).find("#visibility-checkbox").prop('checked')) {
						anyChecked = true;
						return false; // break the loop
					}
				});
				if (!anyChecked) {
					console.log("Trying to set all bottleneck checkboxes to true");
					var omitted;
					// set the checkboxes to true. Don't trigger the change event yet.
					groups.each(function() {
						if ($(this).data("category") === "Zurückgestellte Problemstellen")
							omitted = this;
						  $(this).find("#visibility-checkbox").prop('checked', true);
					});
					// find the category group with the data attribute "Zurückgestellte Problemstelle". Set the checkbox to false and trigger its change event.
          if (omitted){
						console.log("Omitting Zurückgestellte Problemstelle and triggering change");
						$(omitted).find("#visibility-checkbox").prop('checked', false);
						$(omitted).find("#visibility-checkbox").trigger('change');
						}
				}

			}
			// if it was unchecked, also uncheck all bottleneck category groups. Trigger the change handler only of the last one
			else
			{
				let lastGroup = null;
				groups.each(function() {
					$(this).find("#visibility-checkbox").prop('checked', false);
					lastGroup = this;
				});
				if (lastGroup) {
					console.log("Triggering change for last bottleneck category group");
					console.log(lastGroup);
					$(lastGroup).find("#visibility-checkbox").trigger('change');
				}
					}
		});

		$("#tab-measures > #visibility-checkbox").on('change',  (event) => {
			let groups = $('#measures .category-group');
			// If measures was checked, ensure strategies is unchecked and trigger the strategies change handler
			if($(event.target).prop('checked'))
			{
				console.log("Measures tab was changed to true");
//				console.trace("Trace for: Measures checked to true");

					if ($("#tab-strategies > #visibility-checkbox").prop('checked')){
					$("#tab-strategies > #visibility-checkbox").prop('checked', false);
					$("#tab-strategies > #visibility-checkbox").trigger('change');
				}

		    let anyChecked = false;
				groups.each(function() {
					if ($(this).find("#visibility-checkbox").prop('checked')) {
						anyChecked = true;
						return false; // break the loop
					}
				});
				if (!anyChecked)
				{
				// check all measure category groups and trigger the change event
				$('#measures .category-group').each(function() {
					$(this).find("#visibility-checkbox").prop('checked', true);
					console.log("Triggering change in a measure group (" + $(this).data("category") + ").");
					$(this).find("#visibility-checkbox").trigger('change');
				}); }
			}
			// if it was unchecked, also uncheck measures and trigger its change handler
			else
			{	
				$('#measures .category-group').each(function() {
					$(this).find("#visibility-checkbox").prop('checked', false);
					$(this).find("#visibility-checkbox").trigger('change');
				}); 
			}

function handleHovering(){
	let hoveredFeatureId = null;
	let lastHoveredFeatureId = null;
	let lastHoveredLayerId = null;
	let lastHoveredFeature = null;

	let currentFeature = null;
	let currentLayerId = null;

        map.on('mousemove', (e) => {		
			const features = map.queryRenderedFeatures(e.point);

			if (features.length == 0)
				return;

			currentFeature = features[0];
			currentLayerId = currentFeature.layer.id;
			for(let i = 0; i<3; i++)
			{
				if(!(["landkreise-fill", "layer-problemstellen-fill", "alternativrouten-layer"].includes(currentLayerId)))
				{
					if(features[i+1])
					{
					currentFeature = features[i+1]
					currentLayerId = currentFeature.layer.id;
					}

				}
				else break;
				if(i >= 2)
				{
					if(lastHoveredFeature)
					map.setFeatureState(
							{source: lastHoveredFeature.source, id: lastHoveredFeatureId},
							{hover: false}
						);
						return;
				}
			}

			
			let currentFeatureId = currentFeature.id;
			


			if(lastHoveredFeature)
			map.setFeatureState(
							{source: lastHoveredFeature.source, id: lastHoveredFeatureId},
							{hover: false}
						);
			if(!window.cursorOnMarker)
			map.setFeatureState(
							{source: currentFeature.source, id: currentFeatureId},
							{hover: true}
						);

			lastHoveredFeatureId = currentFeatureId;
			lastHoveredLayerId = currentLayerId;
			lastHoveredFeature = currentFeature;

		});
		map.on('mouseleave', 'landkreise-fill', () => {
            if (lastHoveredFeatureId) {
                map.setFeatureState(
                    {source: lastHoveredFeature.source, id: lastHoveredFeatureId},
                    {hover: false}
                );
            }
            hoveredFeatureId = null;
        });
}

function setSvgAsBackground(svgUrl) {
	console.log("Loading image")
    // Fetch the SVG file content
    fetch(svgUrl)
        .then(response => response.text()) // Convert the response to text (SVG XML)
        .then(svgText => {
            // Optional: You can modify the SVG XML here if needed
            // For example, you could change the color, add classes, etc.

            // Encode the SVG content as a data URL
            const encodedData = encodeURIComponent(svgText);
            const dataUrl = `data:image/svg+xml;charset=utf-8,${encodedData}`;

            // Set the backgroundImage to the encoded data URL
            return `url(${dataUrl})`;
        })
        .catch(error => {
            console.error("Error loading SVG:", error);
        });
}

window.jsPDF = window.jspdf.jsPDF
function Print(format) {
    if (format == 'png') {
		html2canvas(document.getElementById('map'), 
		{
			ignoreElements: function( element ) {			
				if( 'map-buttons-container' == element.id ) {
					return true;
				}		
			}
		})
		.then(function(canvas) {
			canvas.toBlob(function(blob) {
                saveAs(blob, 'map.png');
            });;
		});



    } else if (format == 'pdf') {

			html2canvas(document.getElementById('map'), {
                ignoreElements: function (element) {
                    // Ignore specific elements by ID
                    if (element.id === 'map-buttons-container') {
                        return true;
                    }
                }
            }).then(canvas => {
                // Get the canvas as an image
                const imgData = canvas.toDataURL("image/png");

                // Use jsPDF to create a PDF
                const { jsPDF } = window.jspdf; // Access jsPDF from the global window object
                const pdf = new jsPDF();

                // Add the image to the PDF (fit it to the page)
                const imgWidth = 190; // Adjust width to fit the page (A4 is 210mm wide minus margins)
                const pageHeight = pdf.internal.pageSize.height;
                const imgHeight = (canvas.height * imgWidth) / canvas.width;

                pdf.addImage(imgData, "PNG", 10, 10, imgWidth, imgHeight);

                // Save the PDF
                pdf.save("map.pdf");
            });

        }
	
}

				  'layer-problemstellen-fill',
